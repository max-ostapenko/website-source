name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dependabot:
    name: Dependabot auto-merge
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for Dependabot PRs
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'null'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      id-token: write
      contents: read
      checks: write
      pull-requests: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: quarto-dev/quarto-actions/setup@v2
      - run: make env

      - id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/390347019852/locations/global/workloadIdentityPools/test/providers/github-runner'
          service_account: 'github-action-website-source@max-ostapenko.iam.gserviceaccount.com'
          create_credentials_file: true

      - name: Deploy to Firebase Preview
        if: github.event_name == 'pull_request'
        run: npm run deploy-preview -- pr-${{ github.event.pull_request.number }}

      - name: Deploy to Firebase Live
        if: github.event_name == 'push'
        run: npm run deploy
